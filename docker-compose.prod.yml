# ========================================
# MenuQR - Docker Compose PRODUCCIÓN
# ========================================
# Servidor: /opt/menuqr (ejemplo)
# Traefik existente | certresolver: mytlschallenge | red: root_default
# Sin puertos expuestos al host.
#
# Dominio: appmenuqr.com
# DNS (Hostinger u otro): registros A (o AAAA) → IP del VPS.
# Cloudflare vs DNS directo al VPS: la config de Traefik es la misma;
# si usas proxy naranja en Cloudflare, en SSL/TLS suele ir "Full" o "Full (strict)".
#
# Subdominios a crear en DNS:
#   appmenuqr.com, www.appmenuqr.com  → frontend
#   api.appmenuqr.com                 → backend
#   s3.appmenuqr.com                  → MinIO API (imágenes / S3)
#   minio.appmenuqr.com               → consola MinIO (opcional)
#
# En .env de producción alinear URLs:
#   FRONTEND_URL, BACKEND_URL, CORS_ORIGIN, NEXT_PUBLIC_*, MINIO_PUBLIC_URL
#   MINIO_PUBLIC_URL=https://s3.appmenuqr.com  (sin path del bucket; el código concatena bucket/ruta)
# ========================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: menuqr_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-menuqr}
      POSTGRES_USER: ${POSTGRES_USER:-menuqr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-menuqr_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-menuqr_user} -d ${POSTGRES_DB:-menuqr}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - root_default

  redis:
    image: redis:7-alpine
    container_name: menuqr_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - root_default

  minio:
    image: minio/minio:latest
    container_name: menuqr_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      # Un contenedor con 2 puertos: cada router debe declarar .service= explícito (evita "multiple Services")
      - "traefik.http.services.menuqr-s3.loadbalancer.server.port=9000"
      - "traefik.http.services.menuqr-minio-console.loadbalancer.server.port=9001"
      # MinIO S3 API (público para URLs de assets)
      - "traefik.http.routers.menuqr-s3.rule=Host(`s3.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-s3.entrypoints=websecure"
      - "traefik.http.routers.menuqr-s3.tls=true"
      - "traefik.http.routers.menuqr-s3.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.menuqr-s3.service=menuqr-s3"
      - "traefik.http.routers.menuqr-s3-http.rule=Host(`s3.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-s3-http.entrypoints=web"
      - "traefik.http.routers.menuqr-s3-http.middlewares=menuqr-s3-redirect"
      - "traefik.http.routers.menuqr-s3-http.service=menuqr-s3"
      - "traefik.http.middlewares.menuqr-s3-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.menuqr-s3-redirect.redirectscheme.permanent=true"
      # Consola web MinIO
      - "traefik.http.routers.menuqr-minio.rule=Host(`minio.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-minio.entrypoints=websecure"
      - "traefik.http.routers.menuqr-minio.tls=true"
      - "traefik.http.routers.menuqr-minio.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.menuqr-minio.service=menuqr-minio-console"
      - "traefik.http.routers.menuqr-minio-http.rule=Host(`minio.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-minio-http.entrypoints=web"
      - "traefik.http.routers.menuqr-minio-http.middlewares=menuqr-minio-redirect"
      - "traefik.http.routers.menuqr-minio-http.service=menuqr-minio-console"
      - "traefik.http.middlewares.menuqr-minio-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.menuqr-minio-redirect.redirectscheme.permanent=true"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: menuqr_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-menuqr_user}:${POSTGRES_PASSWORD:-menuqr_password}@postgres:5432/${POSTGRES_DB:-menuqr}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.services.menuqr-api.loadbalancer.server.port=3001"
      - "traefik.http.routers.menuqr-api.rule=Host(`api.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-api.entrypoints=websecure"
      - "traefik.http.routers.menuqr-api.tls=true"
      - "traefik.http.routers.menuqr-api.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.menuqr-api.service=menuqr-api"
      - "traefik.http.routers.menuqr-api-http.rule=Host(`api.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-api-http.entrypoints=web"
      - "traefik.http.routers.menuqr-api-http.middlewares=menuqr-api-redirect"
      - "traefik.http.routers.menuqr-api-http.service=menuqr-api"
      - "traefik.http.middlewares.menuqr-api-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.menuqr-api-redirect.redirectscheme.permanent=true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Siempre /api-proxy en build: el .env no debe pisar esto (si no, el navegador llama a api.* y vuelve CORS).
        NEXT_PUBLIC_API_URL: /api-proxy
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_APP_ENV: production
        INTERNAL_API_URL: http://backend:3001
    container_name: menuqr_frontend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      INTERNAL_API_URL: http://backend:3001
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      - backend
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.services.menuqr-front.loadbalancer.server.port=3000"
      - "traefik.http.routers.menuqr-front.rule=Host(`appmenuqr.com`) || Host(`www.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-front.entrypoints=websecure"
      - "traefik.http.routers.menuqr-front.tls=true"
      - "traefik.http.routers.menuqr-front.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.menuqr-front.service=menuqr-front"
      - "traefik.http.routers.menuqr-front-http.rule=Host(`appmenuqr.com`) || Host(`www.appmenuqr.com`)"
      - "traefik.http.routers.menuqr-front-http.entrypoints=web"
      - "traefik.http.routers.menuqr-front-http.middlewares=menuqr-front-redirect"
      - "traefik.http.routers.menuqr-front-http.service=menuqr-front"
      - "traefik.http.middlewares.menuqr-front-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.menuqr-front-redirect.redirectscheme.permanent=true"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  root_default:
    external: true
